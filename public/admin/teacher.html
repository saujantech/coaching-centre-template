<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="manifest" href="/api/manifest" />
<meta name="theme-color" content="" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="" />
<link rel="apple-touch-icon" href="/icons/icon-180.png" />
<link rel="stylesheet" href="/tokens.css" />
<link rel="stylesheet" href="/admin/admin.css" />
<!-- See dashboard.html for why this exists — revealPage() in admin.js
     removes it once role-based restrictions have actually been applied. -->
<div id="role-gate-loading" class="role-gate-loading">Loading...</div>
<main class="dashboard role-gated">
  <div class="dash-header">
    <div class="dash-header-context">
      <small id="centre-name"></small>
      <small id="teacher-session-banner" class="text-muted hidden"></small>
      <a href="/admin/dashboard.html?tab=teachers" class="back-link">&larr; Back to Teachers</a>
    </div>
    <button id="logout-btn" class="secondary">Log out</button>
  </div>

  <section id="teacher-profile-header" class="card profile-header">
    <div class="profile-header-top">
      <div id="profile-photo-avatar" class="avatar avatar-lg"></div>
      <div class="profile-header-info">
        <h1 id="teacher-name"></h1>
        <div class="profile-badges">
          <span id="teacher-status-badge" class="badge"></span>
        </div>
        <p id="teacher-contact-info" class="text-muted"></p>
        <p id="teacher-bio" class="text-muted hidden"></p>
      </div>
    </div>
    <!-- One coherent action row: Edit Details / Delete Teacher always
         show; the login-access group is a single flex item within this
         same row (see .login-access-inline in admin.css) rather than a
         second, separately-wrapped .profile-header-actions block, so it
         wraps together with the other buttons instead of always landing
         on its own disconnected row. -->
    <div class="profile-header-actions">
      <button id="edit-teacher-details-btn" class="secondary">Edit Details</button>
      <button id="delete-teacher-btn" class="secondary">Delete Teacher</button>
      <!-- Owner-only (see applyTeacherTeacherPageRestrictions callers in
           admin.js); hidden by default and only revealed once the
           session is confirmed to be the owner, not shown-then-hidden,
           since toggling another person's login access is an
           administrative action a teacher viewing their own profile
           should never even glimpse. -->
      <div id="login-access-section" class="login-access-inline hidden">
        <span class="text-muted">Login access: <span id="login-access-badge" class="badge"></span></span>
        <button id="login-access-toggle-btn" class="secondary"></button>
      </div>
    </div>
  </section>

  <section id="teacher-classes-section">
    <div class="section-toolbar">
      <h2>Classes</h2>
    </div>
    <div class="card">
      <ul id="teacher-class-list" class="document-list"></ul>
    </div>
  </section>

  <section id="teacher-documents-section">
    <div class="section-toolbar">
      <h2>Documents</h2>
    </div>
    <div class="card">
      <ul id="document-list" class="document-list"></ul>
      <label class="file-upload-label secondary">
        Upload Document(s)
        <input type="file" id="document-input" accept="image/jpeg,image/png,image/webp,application/pdf" multiple hidden />
      </label>
      <p id="document-upload-status" class="status-msg"></p>
    </div>
  </section>
</main>

<script src="/centre.config.js"></script>
<script src="/pwa.js"></script>
<script src="/admin/admin.js"></script>
<script>initTeacherPage();</script>
