<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="manifest" href="/api/manifest" />
<meta name="theme-color" content="" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="" />
<link rel="apple-touch-icon" href="/icons/icon-180.png" />
<link rel="stylesheet" href="/tokens.css" />
<link rel="stylesheet" href="/admin/admin.css" />
<!-- See dashboard.html for why this exists — revealPage() in admin.js
     removes it once role-based restrictions have actually been applied. -->
<div id="role-gate-loading" class="role-gate-loading">Loading...</div>
<main class="dashboard role-gated">
  <div class="dash-header">
    <div class="dash-header-context">
      <small id="centre-name"></small>
      <small id="teacher-session-banner" class="text-muted hidden"></small>
      <a href="/admin/dashboard.html?tab=classes" class="back-link">&larr; Back to Classes</a>
    </div>
    <button id="logout-btn" class="secondary">Log out</button>
  </div>

  <section id="class-header" class="card profile-header"></section>

  <section id="class-roster-section">
    <div class="section-toolbar">
      <h2>Roster</h2>
      <div class="profile-header-actions">
        <!-- Teacher-only (see applyTeacherClassPageRestrictions in admin.js):
             the dashboard's Students tab — and its own Add Student — is
             owner-only, so a teacher has no other way to create a brand
             new student. Hidden by default; only shown for a teacher
             session. -->
        <button id="add-student-to-class-btn" class="secondary hidden">Add Student</button>
        <button id="enroll-student-btn">Enroll Student</button>
      </div>
    </div>
    <div class="card">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Student</th>
              <th>Year</th>
              <th>Enrolled</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="roster-body"></tbody>
        </table>
      </div>
    </div>
  </section>

  <section id="class-teachers-section">
    <div class="section-toolbar">
      <h2>Teachers</h2>
      <button id="assign-teacher-btn">Assign Teacher</button>
    </div>
    <div class="card">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Teacher</th>
              <th>Assigned</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="teacher-roster-body"></tbody>
        </table>
      </div>
    </div>
  </section>

  <section id="class-attendance-section">
    <div class="section-toolbar">
      <h2>Attendance</h2>
    </div>
    <div class="card">
      <label>Date <input type="date" id="attendance-date" /></label>
      <div id="attendance-roster"></div>
      <button id="save-attendance-btn">Save Attendance</button>
      <p id="attendance-status" class="status-msg"></p>
    </div>
  </section>

  <section id="class-attendance-history-section">
    <div class="section-toolbar">
      <h2>Attendance History</h2>
    </div>
    <div class="card">
      <ul id="attendance-history-list" class="document-list"></ul>
    </div>
  </section>
</main>

<script src="/centre.config.js"></script>
<script src="/pwa.js"></script>
<script src="/admin/admin.js"></script>
<script>initClassPage();</script>
