<script>
  // Supabase's admin generate_link endpoint has a known limitation where
  // it sometimes ignores the requested redirect_to and falls back to the
  // project's bare Site URL instead — which can land a teacher's one-time
  // recovery token here, on the public booking page, rather than
  // /admin/confirm-login.html where the actual click-through confirmation
  // step lives (see api/manage-teacher-login.js). Checked first, before
  // anything else on this page runs, and matched loosely (just the hash
  // containing type=recovery and an access_token) rather than tied to
  // any specific redirect target, so this keeps working regardless of
  // exactly where Supabase decides to land the token, as long as it's
  // still somewhere on this domain. location.replace(), not .href, so
  // this bounce never enters browser history.
  (function () {
    var hash = window.location.hash;
    if (hash.indexOf("type=recovery") !== -1 && hash.indexOf("access_token=") !== -1) {
      window.location.replace("/admin/confirm-login.html" + hash);
    }
  })();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="/tokens.css" />
<link rel="stylesheet" href="style.css" />
<main class="page">
  <header class="hero">
    <img id="logo" class="logo" alt="" />
    <h1 id="centre-name"></h1>
    <p id="tagline" class="tagline"></p>
  </header>

  <section class="card">
    <h2>Book a Free Trial Class</h2>
    <form id="booking-form" novalidate>
      <label>
        Child's name
        <input type="text" name="child_name" required />
      </label>

      <label>
        Year level
        <select name="year_level" id="year-level" required></select>
      </label>

      <fieldset>
        <legend>Subjects</legend>
        <div id="subjects" class="checkbox-group"></div>
      </fieldset>

      <label>
        Preferred date
        <input type="date" name="preferred_date" />
      </label>

      <label>
        Preferred time
        <div id="preferred-time-picker"></div>
      </label>

      <label>
        Your name
        <input type="text" name="parent_name" required />
      </label>

      <label>
        Phone <span class="required-mark" aria-hidden="true">*</span>
        <input
          type="tel"
          name="parent_phone"
          inputmode="numeric"
          pattern="0[0-9]{9}"
          maxlength="10"
          placeholder="0412 345 678"
          required
        />
      </label>

      <label>
        Email
        <input type="email" name="parent_email" required />
      </label>

      <label>
        Anything else we should know?
        <textarea name="message" rows="3"></textarea>
      </label>

      <label class="checkbox-label">
        <input type="checkbox" name="consent" id="consent" required />
        <span>
          I agree to the <a href="/terms.html" target="_blank" rel="noopener">Terms &amp; Conditions</a>
          and <a href="/privacy.html" target="_blank" rel="noopener">Privacy Policy</a>, and consent to
          this information being used to contact me about this booking.
        </span>
      </label>

      <button type="submit" id="submit-btn">Request a Trial</button>
      <p id="form-status" class="status-msg" role="status"></p>
    </form>
  </section>

  <footer class="footer">
    <p id="contact-line"></p>
  </footer>
</main>

<script src="/centre.config.js"></script>
<script src="/time-picker.js"></script>
<script src="booking.js"></script>
