<link rel="stylesheet" href="style.css" />
<main class="page">
  <header class="hero">
    <img id="logo" class="logo" alt="" />
    <h1 id="centre-name"></h1>
    <p id="tagline" class="tagline"></p>
  </header>

  <section class="card">
    <h2>Book a Free Trial Class</h2>
    <form id="booking-form" novalidate>
      <label>
        Child's name
        <input type="text" name="child_name" required />
      </label>

      <label>
        Year level
        <select name="year_level" id="year-level" required></select>
      </label>

      <fieldset id="subject-fieldset">
        <legend>Subject(s)</legend>
        <div id="subject-options" class="checkbox-list"></div>
      </fieldset>

      <label>
        Preferred date
        <input type="date" name="preferred_date" />
      </label>

      <label>
        Preferred time
        <input type="time" name="preferred_time" />
      </label>

      <label>
        Your name
        <input type="text" name="parent_name" required />
      </label>

      <label>
        Phone
        <input
          type="tel"
          name="parent_phone"
          inputmode="numeric"
          pattern="0[0-9]{9}"
          placeholder="0412 345 678"
          required
        />
      </label>

      <label>
        Email
        <input type="email" name="parent_email" required />
      </label>

      <label>
        Anything else we should know?
        <textarea name="message" rows="3"></textarea>
      </label>

      <label class="checkbox-row">
        <input type="checkbox" name="consent" required />
        <span>
          I agree to the <a href="/terms.html" target="_blank">Terms &amp; Conditions</a>
          and <a href="/privacy.html" target="_blank">Privacy Policy</a>, and consent to
          this information being used to contact me about this booking.
        </span>
      </label>

      <button type="submit" id="submit-btn">Request a Trial</button>
      <p id="form-status" role="status"></p>
    </form>
  </section>

  <footer class="footer">
    <p id="contact-line"></p>
  </footer>
</main>

<script src="/centre.config.js"></script>
<script src="booking.js"></script>
